version: v1.3.1

dsn: postgres://postgres:password@postgres:5432/exponential?sslmode=disable

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3015
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:3015/
  allowed_return_urls:
    - http://localhost:3015
  methods:
    password:
      enabled: true
    link:
      enabled: true
    oidc:
      enabled: true
      config:
        providers:
          - id: google
            provider: google
            client_id: ${GOOGLE_CLIENT_ID}
            client_secret: ${GOOGLE_CLIENT_SECRET}
            mapper_url: file:///etc/config/kratos/oidc.google.jsonnet
            scope:
              - email
              - profile
  flows:
    error:
      ui_url: http://localhost:3015/login
    settings:
      ui_url: http://localhost:3015/settings
    recovery:
      enabled: true
      ui_url: http://localhost:3015/recovery
    verification:
      enabled: true
      ui_url: http://localhost:3015/verification
    logout:
      after:
        default_browser_return_url: http://localhost:3015/login
    login:
      ui_url: http://localhost:3015/login
    registration:
      ui_url: http://localhost:3015/register

log:
  level: info
  format: json

secrets:
  cookie:
    - PLEASE-CHANGE-ME-COOKIE-SECRET-32B
  cipher:
    - PLEASE-CHANGE-ME-CIPHER-SECRET-32B

ciphers:
  algorithm: xchacha20-poly1305

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtp://test:test@mailhog:1025/?disable_starttls=true
