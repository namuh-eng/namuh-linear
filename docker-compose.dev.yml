# docker-compose.dev.yml — Local development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Differences from production:
#   - app: built from local Dockerfile instead of pulling from GHCR
#   - app: source code mounted for hot reload
#   - postgres: exposed to host (default 5432, override with PG_PORT)
#   - redis: exposed to host (default 6379, override with REDIS_PORT)

services:
  # ---------------------------------------------------------------------------
  # App — build locally and mount source for hot reload
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: namuh-linear:dev
    environment:
      NODE_ENV: development
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Prevent host node_modules from overwriting container's
      - /app/node_modules
      - /app/.next

  # ---------------------------------------------------------------------------
  # Postgres — expose to host (PG_PORT, default 5432)
  # ---------------------------------------------------------------------------
  postgres:
    ports:
      - "${PG_PORT:-5432}:5432"

  # ---------------------------------------------------------------------------
  # Redis — expose to host (REDIS_PORT, default 6379)
  # ---------------------------------------------------------------------------
  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"
