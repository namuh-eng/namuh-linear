# docker-compose.dev.yml — Phase 0 local split stack.
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: exponential
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${PG_PORT:-15532}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exponential"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  kratos-migrate:
    image: oryd/kratos:v1.3.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/kratos:/etc/config/kratos:ro
    command: migrate sql -e --yes --config /etc/config/kratos/kratos.yml

  kratos:
    image: oryd/kratos:v1.3.1
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    ports:
      - "4433:4433"
      - "4434:4434"
    volumes:
      - ./infra/kratos:/etc/config/kratos:ro
    command: serve --dev --config /etc/config/kratos/kratos.yml

  api-migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    entrypoint: ["exponential-migrate"]
    environment:
      EXPONENTIAL_API_DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@postgres:5432/exponential?sslmode=disable
      MIGRATIONS_DIR: /migrations
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      EXPONENTIAL_API_ADDR: ":3016"
      EXPONENTIAL_API_DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@postgres:5432/exponential?sslmode=disable
      EXPONENTIAL_API_REDIS_URL: redis://redis:6379
      EXPONENTIAL_API_KRATOS_URL: http://kratos:4433
      EXPONENTIAL_API_ENVIRONMENT: development
    ports:
      - "3016:3016"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kratos:
        condition: service_started
      api-migrate:
        condition: service_completed_successfully

  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter @exponential/web dev -- --hostname 0.0.0.0"
    environment:
      NODE_ENV: development
      PORT: 3015
      SKIP_DB_PREFLIGHT: "true"
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@postgres:5432/exponential?sslmode=disable
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3015
      BETTER_AUTH_URL: http://localhost:3015
      EXPONENTIAL_API_URL: http://api:3016/v1
      EXPONENTIAL_HEADLESS_DIRECT_API_REWRITE: "true"
      EXPONENTIAL_KRATOS_PUBLIC_URL: http://kratos:4433
      EXPONENTIAL_HEADLESS_ISSUES: "true"
      EXPONENTIAL_HEADLESS_ISSUE_BULK: "true"
      EXPONENTIAL_HEADLESS_ACCOUNT_NOTIFICATIONS: "true"
      EXPONENTIAL_HEADLESS_ACCOUNT_PREFERENCES: "true"
      EXPONENTIAL_HEADLESS_ACCOUNT_PROFILE: "true"
      EXPONENTIAL_HEADLESS_ACCOUNT_SECURITY: "true"
      EXPONENTIAL_HEADLESS_ACCOUNT_WORKSPACE_LEAVE: "true"
      EXPONENTIAL_HEADLESS_VIEWS: "true"
      EXPONENTIAL_HEADLESS_MY_ISSUES: "true"
      EXPONENTIAL_HEADLESS_PROJECT_UPDATE_CONFIGURATIONS: "true"
      EXPONENTIAL_HEADLESS_PROJECT_UPDATES: "true"
      EXPONENTIAL_HEADLESS_AGENT_RUNS: "true"
      EXPONENTIAL_HEADLESS_PROJECT_LABELS: "true"
      EXPONENTIAL_HEADLESS_PROJECT_STATUSES: "true"
      EXPONENTIAL_HEADLESS_CUSTOM_EMOJIS: "true"
      EXPONENTIAL_HEADLESS_PROJECT_TEMPLATES: "true"
      EXPONENTIAL_HEADLESS_NOTIFICATIONS: "true"
      EXPONENTIAL_HEADLESS_LABELS: "true"
      EXPONENTIAL_HEADLESS_ISSUE_TEMPLATES: "true"
      EXPONENTIAL_HEADLESS_DOCUMENTS: "true"
      EXPONENTIAL_HEADLESS_SIDEBAR_FAVORITES: "true"
      EXPONENTIAL_HEADLESS_INTEGRATIONS: "true"
      EXPONENTIAL_HEADLESS_ANALYTICS: "true"
      EXPONENTIAL_HEADLESS_TEAMS: "true"
      EXPONENTIAL_HEADLESS_WORKSPACES: "true"
      EXPONENTIAL_HEADLESS_COMMENTS: "true"
      EXPONENTIAL_HEADLESS_AUTH_PROVIDERS: "true"
      EXPONENTIAL_HEADLESS_PROJECTS: "true"
      EXPONENTIAL_HEADLESS_INBOUND: "true"
      EXPONENTIAL_HEADLESS_INITIATIVES: "true"
    ports:
      - "3015:3015"
    volumes:
      - .:/workspace
      - pnpm_store:/root/.local/share/pnpm/store
      - web_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
      kratos:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  pnpm_store:
  web_node_modules:
  web_app_node_modules:
