components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: lin_api or pat
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, minLength: 1, maxLength: 255 }
  responses:
    Problem:
      description: RFC 7807 problem response
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
    AccountProfile:
      type: object
      required: [name, email, username, pronouns, title, location, timezone, showLocalTime]
      properties:
        name: { type: string }
        email: { type: string }
        username: { type: string }
        pronouns: { type: string }
        title: { type: string }
        location: { type: string }
        timezone: { type: string }
        showLocalTime: { type: boolean }
        image: { type: [string, 'null'] }
    WorkspaceAccess:
      type: object
      properties:
        currentWorkspaceId: { type: [string, 'null'], format: uuid }
        currentWorkspaceName: { type: [string, 'null'] }
    AccountProfileResponse:
      type: object
      required: [profile, workspaceAccess]
      properties:
        profile: { $ref: '#/components/schemas/AccountProfile' }
        workspaceAccess: { $ref: '#/components/schemas/WorkspaceAccess' }
    UpdateAccountProfileRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        username: { type: string }
        image: { type: [string, 'null'] }
        pronouns: { type: string }
        title: { type: string }
        location: { type: string }
        timezone: { type: string }
        showLocalTime: { type: boolean }
    AccountNotificationsResponse:
      type: object
      required: [accountNotifications]
      properties:
        accountNotifications:
          type: object
          additionalProperties: true
    UpdateAccountNotificationsRequest:
      type: object
      required: [accountNotifications]
      properties:
        accountNotifications:
          type: object
          additionalProperties: true
    LeaveWorkspaceResponse:
      type: object
      required: [success, redirectTo]
      properties:
        success: { type: boolean }
        redirectTo: { type: string }
    AccountPreferencesResponse:
      type: object
      required: [accountPreferences]
      properties:
        accountPreferences:
          type: object
          additionalProperties: true
    UpdateAccountPreferencesRequest:
      type: object
      required: [accountPreferences]
      properties:
        accountPreferences:
          type: object
          additionalProperties: true
    AnalyticsCompletedTeamCount:
      type: object
      required: [teamId, teamName, completedCount]
      properties:
        teamId: { type: string, format: uuid }
        teamName: { type: string }
        completedCount: { type: integer }
    AnalyticsActiveTeamCount:
      type: object
      required: [teamId, teamName, activeCount]
      properties:
        teamId: { type: string, format: uuid }
        teamName: { type: string }
        activeCount: { type: integer }
    WorkspaceAnalyticsResponse:
      type: object
      required: [workspaceId, completedLast30Days, activeIssues, period]
      properties:
        workspaceId: { type: string, format: uuid }
        completedLast30Days:
          type: array
          items: { $ref: '#/components/schemas/AnalyticsCompletedTeamCount' }
        activeIssues:
          type: array
          items: { $ref: '#/components/schemas/AnalyticsActiveTeamCount' }
        period: { type: string }
    AccountProviderCapability:
      type: object
      required: [supported, configured, devLinking, unavailableReason]
      properties:
        supported: { type: boolean }
        configured: { type: boolean }
        devLinking: { type: boolean }
        unavailableReason: { type: [string, 'null'] }
    WorkspaceAuthenticationSettings:
      type: object
      required: [google, emailPasskey]
      properties:
        google: { type: boolean }
        emailPasskey: { type: boolean }
    AuthProviderWorkspace:
      type: object
      required: [slug, authentication]
      properties:
        slug: { type: string }
        authentication: { $ref: '#/components/schemas/WorkspaceAuthenticationSettings' }
    AuthProviderCapabilitiesResponse:
      type: object
      required: [providers, workspace]
      properties:
        providers:
          type: object
          required: [google, github, gitlab, slack, passkey, googleAllowed, emailPasskey]
          properties:
            google: { $ref: '#/components/schemas/AccountProviderCapability' }
            github: { $ref: '#/components/schemas/AccountProviderCapability' }
            gitlab: { $ref: '#/components/schemas/AccountProviderCapability' }
            slack: { $ref: '#/components/schemas/AccountProviderCapability' }
            passkey: { type: boolean }
            googleAllowed: { type: boolean }
            emailPasskey: { type: boolean }
        workspace:
          anyOf:
            - $ref: '#/components/schemas/AuthProviderWorkspace'
            - type: 'null'
    CommentUser:
      type: object
      required: [name]
      properties:
        name: { type: string }
        image: { type: [string, 'null'] }
    ReactionSummary:
      type: object
      required: [emoji, count]
      properties:
        emoji: { type: string }
        count: { type: integer }
        reacted: { type: boolean }
        reactedByMe: { type: boolean }
    ReactionSummaryList:
      type: array
      items: { $ref: '#/components/schemas/ReactionSummary' }
    Comment:
      type: object
      required: [id, body, issue_id, user_id, user, owned_by_me, can_edit, can_delete, reactions, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        body: { type: string }
        issue_id: { type: string, format: uuid }
        user_id: { type: string }
        user: { $ref: '#/components/schemas/CommentUser' }
        owned_by_me: { type: boolean }
        can_edit: { type: boolean }
        can_delete: { type: boolean }
        reactions:
          type: array
          items: { $ref: '#/components/schemas/ReactionSummary' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1 }
    UpdateCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1 }
    ReactionRequest:
      type: object
      required: [emoji]
      properties:
        emoji: { type: string, minLength: 1, maxLength: 50 }
    CustomEmoji:
      type: object
      required: [id, name, imageUrl, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        imageUrl: { type: string }
        createdAt: { type: string, format: date-time }
    CustomEmojiListResponse:
      type: object
      required: [emojis]
      properties:
        emojis:
          type: array
          items: { $ref: '#/components/schemas/CustomEmoji' }
    CustomEmojiResponse:
      type: object
      required: [emoji]
      properties:
        emoji: { $ref: '#/components/schemas/CustomEmoji' }
    CreateCustomEmojiRequest:
      type: object
