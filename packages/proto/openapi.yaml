openapi: 3.1.0
info:
  title: Exponential Headless API
  version: 0.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: http://localhost:3016/v1
security:
  - bearerAuth: []
paths:
  /issues:
    get:
      operationId: listIssues
      summary: List issues in the authenticated workspace
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: team_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Issues page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createIssue
      summary: Create an issue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIssueRequest'
      responses:
        '201':
          description: Created issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
  /issues/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getIssue
      responses:
        '200':
          description: Issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIssueRequest'
      responses:
        '200':
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean }
        default:
          $ref: '#/components/responses/Problem'
  /issues/{id}/comments:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: createIssueComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Created comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        default:
          $ref: '#/components/responses/Problem'
  /issues/{id}/reactions:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: toggleIssueReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactionRequest'
      responses:
        '200':
          description: Issue reaction summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionSummaryList'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteIssueReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactionRequest'
      responses:
        '200':
          description: Issue reaction summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionSummaryList'
        default:
          $ref: '#/components/responses/Problem'
  /issues/search:
    get:
      operationId: searchIssues
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: workspaceId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Issue search results
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/IssueSearchResult' }
        default:
          $ref: '#/components/responses/Problem'
  /issues/{id}/subscription:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getIssueSubscription
      responses:
        '200':
          description: Issue subscription summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSubscriptionSummary'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: subscribeToIssue
      responses:
        '200':
          description: Issue subscription summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSubscriptionSummary'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: unsubscribeFromIssue
      responses:
        '200':
          description: Issue subscription summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSubscriptionSummary'
        default:
          $ref: '#/components/responses/Problem'
  /issue-templates:
    get:
      operationId: listIssueTemplates
      parameters:
        - name: teamKey
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Issue templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueTemplateListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createIssueTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIssueTemplateRequest'
      responses:
        '201':
          description: Created issue template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueTemplateResponse'
        default:
          $ref: '#/components/responses/Problem'
  /issue-templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateIssueTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIssueTemplateRequest'
      responses:
        '200':
          description: Updated issue template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueTemplateResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteIssueTemplate
      responses:
        '200':
          description: Deleted issue template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /account:
    get:
      operationId: accountNamespace
      summary: Account route namespace; concrete resources are under /account/profile and /account/preferences.
      responses:
        default:
          $ref: '#/components/responses/Problem'
  /account/profile:
    get:
      operationId: getAccountProfile
      responses:
        '200':
          description: Account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateAccountProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountProfileRequest'
      responses:
        '200':
          description: Updated account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileResponse'
        default:
          $ref: '#/components/responses/Problem'
  /account/notifications:
    get:
      operationId: getAccountNotifications
      responses:
        '200':
          description: Account notification settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountNotificationsResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateAccountNotifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountNotificationsRequest'
      responses:
        '200':
          description: Updated account notification settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountNotificationsResponse'
        default:
          $ref: '#/components/responses/Problem'
  /account/profile/workspace:
    delete:
      operationId: leaveAccountWorkspace
      responses:
        '200':
          description: Left active workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /account/preferences:
    get:
      operationId: getAccountPreferences
      responses:
        '200':
          description: Account preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPreferencesResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateAccountPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountPreferencesRequest'
      responses:
        '200':
          description: Updated account preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPreferencesResponse'
        default:
          $ref: '#/components/responses/Problem'
  /analytics:
    get:
      operationId: analyticsNamespace
      summary: Analytics route namespace; concrete resources are under /analytics/workspace.
      responses:
        default:
          $ref: '#/components/responses/Problem'
  /analytics/workspace:
    get:
      operationId: getWorkspaceAnalytics
      responses:
        '200':
          description: Workspace analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceAnalyticsResponse'
        default:
          $ref: '#/components/responses/Problem'
  /auth:
    get:
      operationId: authNamespace
      summary: Auth route namespace; concrete resources are under /auth/provider-capabilities.
      responses:
        default:
          $ref: '#/components/responses/Problem'
  /auth/provider-capabilities:
    get:
      operationId: getAuthProviderCapabilities
      parameters:
        - name: callbackUrl
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Auth provider capabilities
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProviderCapabilitiesResponse'
        default:
          $ref: '#/components/responses/Problem'
  /comments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteComment
      responses:
        '200':
          description: Deleted comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /comments/{id}/reactions:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: toggleCommentReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactionRequest'
      responses:
        '200':
          description: Comment reaction summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionSummaryList'
        default:
          $ref: '#/components/responses/Problem'
  /custom-emojis:
    get:
      operationId: listCustomEmojis
      responses:
        '200':
          description: Custom emojis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomEmojiListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createCustomEmoji
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomEmojiRequest'
      responses:
        '201':
          description: Created custom emoji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomEmojiResponse'
        default:
          $ref: '#/components/responses/Problem'
  /custom-emojis/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    delete:
      operationId: deleteCustomEmoji
      responses:
        '200':
          description: Deleted custom emoji
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        default:
          $ref: '#/components/responses/Problem'
  /document-settings:
    get:
      operationId: getDocumentSettings
      responses:
        '200':
          description: Document settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSettingsResponse'
        default:
          $ref: '#/components/responses/Problem'
  /document-folders:
    post:
      operationId: createDocumentFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentFolderRequest'
      responses:
        '201':
          description: Created document folder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentFolderResponse'
        default:
          $ref: '#/components/responses/Problem'
  /document-folders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateDocumentFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentFolderRequest'
      responses:
        '200':
          description: Updated document folder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentFolderResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteDocumentFolder
      responses:
        '200':
          description: Deleted document folder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /document-templates:
    post:
      operationId: createDocumentTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentTemplateRequest'
      responses:
        '201':
          description: Created document template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTemplateResponse'
        default:
          $ref: '#/components/responses/Problem'
  /document-templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    patch:
      operationId: updateDocumentTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentTemplateRequest'
      responses:
        '200':
          description: Updated document template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTemplateResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteDocumentTemplate
      responses:
        '200':
          description: Deleted document template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /integrations:
    get:
      operationId: listIntegrations
      responses:
        '200':
          description: Workspace integrations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationListResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteIntegration
      parameters:
        - name: provider
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted integration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /integrations/slack/connect:
    post:
      operationId: connectSlackIntegration
      responses:
        '200':
          description: Slack authorization URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlackConnectResponse'
        '412':
          description: Slack OAuth is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlackConfigurationRequiredResponse'
        default:
          $ref: '#/components/responses/Problem'
  /integrations/slack/disconnect:
    post:
      operationId: disconnectSlackIntegration
      responses:
        '200':
          description: Slack disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /labels:
    get:
      operationId: listLabels
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [workspace, team, all], default: workspace }
        - name: teamId
          in: query
          schema: { type: string, format: uuid }
        - name: includeArchived
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Labels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLabelRequest'
      responses:
        '201':
          description: Created label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelResponse'
        default:
          $ref: '#/components/responses/Problem'
  /labels/bulk:
    post:
      operationId: bulkLabelAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkLabelRequest'
      responses:
        '200':
          description: Bulk label action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkLabelResponse'
        default:
          $ref: '#/components/responses/Problem'
  /labels/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLabelRequest'
      responses:
        '200':
          description: Updated label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteLabel
      responses:
        '200':
          description: Deleted label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /project-labels:
    get:
      operationId: listProjectLabels
      responses:
        '200':
          description: Project labels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectLabelListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createProjectLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectLabelRequest'
      responses:
        '201':
          description: Created project label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectLabelResponse'
        default:
          $ref: '#/components/responses/Problem'
  /project-labels/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateProjectLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectLabelRequest'
      responses:
        '200':
          description: Updated project label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectLabelResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteProjectLabel
      responses:
        '200':
          description: Deleted project label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /notifications:
    get:
      operationId: listNotifications
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /notifications/bulk-read:
    patch:
      operationId: markNotificationsRead
      responses:
        '200':
          description: Bulk mark notifications read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkReadNotificationsResponse'
        default:
          $ref: '#/components/responses/Problem'
  /notifications/{id}/read:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: markNotificationRead
      responses:
        '200':
          description: Notification read result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationActionResponse'
        default:
          $ref: '#/components/responses/Problem'
  /notifications/{id}/unread:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: markNotificationUnread
      responses:
        '200':
          description: Notification unread result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationActionResponse'
        default:
          $ref: '#/components/responses/Problem'
  /notifications/{id}/snooze:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: snoozeNotification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnoozeNotificationRequest'
      responses:
        '200':
          description: Notification snooze result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationActionResponse'
        default:
          $ref: '#/components/responses/Problem'
  /personal-access-tokens:
    get:
      operationId: listPersonalAccessTokens
      responses:
        '200':
          description: Personal access tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalAccessTokenListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createPersonalAccessToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePersonalAccessTokenRequest'
      responses:
        '201':
          description: Created personal access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePersonalAccessTokenResponse'
        default:
          $ref: '#/components/responses/Problem'
  /personal-access-tokens/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      operationId: revokePersonalAccessToken
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /project-templates:
    get:
      operationId: listProjectTemplates
      summary: List project templates in the authenticated workspace
      responses:
        '200':
          description: Project templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTemplateListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createProjectTemplate
      summary: Create a project template
      requestBody:
