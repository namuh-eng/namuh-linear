                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: removeWorkspaceMemberOrInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/current/import-export:
    get:
      operationId: getCurrentWorkspaceImportExport
      responses:
        '200':
          description: Current workspace import/export state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceImportExportResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: mutateCurrentWorkspaceImportExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceImportExportActionRequest'
      responses:
        '200':
          description: Import/export action result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '201':
          description: Import/export job created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/current/import-export/exports/{id}/download:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: downloadCurrentWorkspaceExport
      responses:
        '200':
          description: Workspace export artifact
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/exports:
    get:
      operationId: listWorkspaceExports
      parameters:
        - name: id
          in: query
          schema: { type: string }
        - name: download
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Workspace exports or export artifact download
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createWorkspaceExport
      responses:
        '200':
          description: Workspace export created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceExportsResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/imports:
    get:
      operationId: listWorkspaceImports
      responses:
        '200':
          description: Workspace import jobs and teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceImportsResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createWorkspaceImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceImportRequest'
      responses:
        '200':
          description: Workspace import completed
          content:
            application/json:
              schema:
                type: object
                required: [import]
                properties:
                  import: { $ref: '#/components/schemas/WorkspaceImportExportJob' }
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/imports/preview:
    post:
      operationId: previewWorkspaceImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceImportPreviewRequest'
      responses:
        '200':
          description: Workspace import preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceImportPreviewResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/invite:
    post:
      operationId: inviteWorkspaceMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteWorkspaceMembersRequest'
      responses:
        '200':
          description: Invite results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteWorkspaceMembersResponse'
        default:
          $ref: '#/components/responses/Problem'
  /sync/ws:
    get:
      operationId: watchSync
      summary: Open a workspace sync WebSocket and replay operations after a version
      parameters:
        - name: version
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: access_token
          in: query
          description: Browser/CLI WebSocket auth fallback when Authorization headers are unavailable.
          schema: { type: string }
      responses:
        '101':
          description: WebSocket protocol switch
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: lin_api or pat
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, minLength: 1, maxLength: 255 }
  responses:
    Problem:
      description: RFC 7807 problem response
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
    AccountSecurityResponse:
      type: object
      additionalProperties: true
      required: [sessions, passkeys, authorizedApplications, apiKeys, canCreateApiKeys, providers, passkeyEnabled]
      properties:
        sessions:
          type: array
          items: { type: object, additionalProperties: true }
        passkeys:
          type: array
          items: { type: object, additionalProperties: true }
        authorizedApplications:
          type: array
          items: { type: object, additionalProperties: true }
        apiKeys:
          type: array
          items: { type: object, additionalProperties: true }
        canCreateApiKeys: { type: boolean }
        providers:
          type: array
          items: { type: object, additionalProperties: true }
        passkeyEnabled: { type: boolean }
        createdCredential:
          type: object
          additionalProperties: true
    AccountSecurityActionRequest:
      type: object
      additionalProperties: true
      properties:
        action: { type: string }
        passkeyId: { type: string }
        sessionId: { type: string }
        applicationId: { type: string }
        apiKeyId: { type: string }
        name: { type: string }
    AccountProfile:
      type: object
      required: [name, email, username, pronouns, title, location, timezone, showLocalTime]
      properties:
        name: { type: string }
        email: { type: string }
        username: { type: string }
        pronouns: { type: string }
        title: { type: string }
        location: { type: string }
        timezone: { type: string }
        showLocalTime: { type: boolean }
        image: { type: [string, 'null'] }
    WorkspaceAccess:
      type: object
      properties:
        currentWorkspaceId: { type: [string, 'null'], format: uuid }
        currentWorkspaceName: { type: [string, 'null'] }
    AccountProfileResponse:
      type: object
      required: [profile, workspaceAccess]
      properties:
        profile: { $ref: '#/components/schemas/AccountProfile' }
        workspaceAccess: { $ref: '#/components/schemas/WorkspaceAccess' }
    UpdateAccountProfileRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        username: { type: string }
        image: { type: [string, 'null'] }
        pronouns: { type: string }
        title: { type: string }
        location: { type: string }
        timezone: { type: string }
        showLocalTime: { type: boolean }
    AccountNotificationsResponse:
      type: object
      required: [accountNotifications]
      properties:
        accountNotifications:
          type: object
          additionalProperties: true
    UpdateAccountNotificationsRequest:
      type: object
      required: [accountNotifications]
      properties:
        accountNotifications:
          type: object
          additionalProperties: true
    LeaveWorkspaceResponse:
      type: object
      required: [success, redirectTo]
      properties:
        success: { type: boolean }
        redirectTo: { type: string }
    AccountPreferencesResponse:
      type: object
      required: [accountPreferences]
      properties:
        accountPreferences:
          type: object
          additionalProperties: true
    UpdateAccountPreferencesRequest:
      type: object
      required: [accountPreferences]
      properties:
        accountPreferences:
          type: object
          additionalProperties: true
    AnalyticsCompletedTeamCount:
      type: object
      required: [teamId, teamName, completedCount]
      properties:
        teamId: { type: string, format: uuid }
        teamName: { type: string }
        completedCount: { type: integer }
    AnalyticsActiveTeamCount:
      type: object
      required: [teamId, teamName, activeCount]
      properties:
        teamId: { type: string, format: uuid }
        teamName: { type: string }
