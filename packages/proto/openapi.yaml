openapi: 3.1.0
info:
  title: Exponential Headless API
  version: 0.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: http://localhost:3016/v1
security:
  - bearerAuth: []
paths:
  /issues:
    get:
      operationId: listIssues
      summary: List issues in the authenticated workspace
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: team_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Issues page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createIssue
      summary: Create an issue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIssueRequest'
      responses:
        '201':
          description: Created issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
  /issues/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getIssue
      responses:
        '200':
          description: Issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIssueRequest'
      responses:
        '200':
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean }
        default:
          $ref: '#/components/responses/Problem'
  /personal-access-tokens:
    get:
      operationId: listPersonalAccessTokens
      responses:
        '200':
          description: Personal access tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalAccessTokenListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createPersonalAccessToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePersonalAccessTokenRequest'
      responses:
        '201':
          description: Created personal access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePersonalAccessTokenResponse'
        default:
          $ref: '#/components/responses/Problem'
  /personal-access-tokens/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      operationId: revokePersonalAccessToken
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects:
    get:
      operationId: listProjects
      summary: List projects in the authenticated workspace
      responses:
        '200':
          description: Projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getProject
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteProject
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /teams:
    get:
      operationId: listTeams
      summary: List visible teams in the authenticated workspace
      responses:
        '200':
          description: Teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createTeam
      summary: Create a team with default workflow states
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Created team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTeamResponse'
        default:
          $ref: '#/components/responses/Problem'
  /teams/{key}/cycles:
    parameters:
      - name: key
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: listTeamCycles
      responses:
        '200':
          description: Team cycles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamCyclesResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createTeamCycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCycleRequest'
      responses:
        '201':
          description: Created cycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cycle'
        default:
          $ref: '#/components/responses/Problem'
  /teams/{key}/cycles/{cycle_id}:
    parameters:
      - name: key
        in: path
        required: true
        schema: { type: string }
      - name: cycle_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateTeamCycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCycleRequest'
      responses:
        '200':
          description: Updated cycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cycle'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteTeamCycle
      responses:
        '200':
          description: Deleted cycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces for the authenticated principal
      responses:
        '200':
          description: Workspace memberships
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WorkspaceMembership' }
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createWorkspace
      summary: Create a workspace with a default team and workflow states
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/current:
    get:
      operationId: getCurrentWorkspace
      responses:
        '200':
          description: Current workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateCurrentWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        '200':
          description: Updated current workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteCurrentWorkspace
      responses:
        '200':
          description: Deleted current workspace
          content:
            application/json:
              schema:
                type: object
                required: [success, redirectTo]
                properties:
                  success: { type: boolean }
                  redirectTo: { type: string }
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/members:
    get:
      operationId: listWorkspaceMembers
      responses:
        '200':
          description: Active members and pending invitations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMembersResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateWorkspaceMemberOrInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: resendWorkspaceInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: removeWorkspaceMemberOrInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/invite:
    post:
      operationId: inviteWorkspaceMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteWorkspaceMembersRequest'
      responses:
        '200':
          description: Invite results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteWorkspaceMembersResponse'
        default:
          $ref: '#/components/responses/Problem'
  /sync/ws:
    get:
      operationId: watchSync
      summary: Open a workspace sync WebSocket and replay operations after a version
      parameters:
        - name: version
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: access_token
          in: query
          description: Browser/CLI WebSocket auth fallback when Authorization headers are unavailable.
          schema: { type: string }
      responses:
        '101':
          description: WebSocket protocol switch
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: lin_api or pat
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, minLength: 1, maxLength: 255 }
  responses:
    Problem:
      description: RFC 7807 problem response
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
    PersonalAccessToken:
      type: object
      required: [id, name, token_prefix, scopes, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        token_prefix: { type: string }
        scopes:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: [string, 'null'], format: date-time }
        revoked_at: { type: [string, 'null'], format: date-time }
    PersonalAccessTokenListResponse:
      type: object
      required: [tokens]
      properties:
        tokens:
          type: array
          items: { $ref: '#/components/schemas/PersonalAccessToken' }
    CreatePersonalAccessTokenRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        scopes:
          type: array
          items: { type: string }
    CreatePersonalAccessTokenResponse:
      type: object
      required: [token, value]
      properties:
        token: { $ref: '#/components/schemas/PersonalAccessToken' }
        value: { type: string }
    ProjectStatus:
      type: string
      enum: [planned, started, paused, completed, canceled]
    ProjectPriority:
      type: string
      enum: [none, urgent, high, medium, low]
    ProjectTeam:
      type: object
      required: [id, key, name]
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        name: { type: string }
    ProjectProgress:
      type: object
      required: [total, completed, percentage]
      properties:
        total: { type: integer }
        completed: { type: integer }
        percentage: { type: integer }
    Project:
      type: object
      required: [id, name, slug, status, priority, workspace_id, teams, progress, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, 'null'] }
        icon: { type: [string, 'null'] }
        slug: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        priority: { $ref: '#/components/schemas/ProjectPriority' }
        lead_id: { type: [string, 'null'] }
        workspace_id: { type: string, format: uuid }
        start_date: { type: [string, 'null'], format: date-time }
        target_date: { type: [string, 'null'], format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
        canceled_at: { type: [string, 'null'], format: date-time }
        teams:
          type: array
          items: { $ref: '#/components/schemas/ProjectTeam' }
        progress: { $ref: '#/components/schemas/ProjectProgress' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProjectListResponse:
      type: object
      required: [projects]
      properties:
        projects:
          type: array
          items: { $ref: '#/components/schemas/Project' }
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: [string, 'null'] }
        icon: { type: [string, 'null'], maxLength: 10 }
        slug: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        priority: { $ref: '#/components/schemas/ProjectPriority' }
        lead_id: { type: [string, 'null'] }
        start_date: { type: [string, 'null'], format: date-time }
        target_date: { type: [string, 'null'], format: date-time }
        team_ids:
          type: array
          items: { type: string, format: uuid }
        team_keys:
          type: array
          items: { type: string }
    UpdateProjectRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: [string, 'null'] }
        icon: { type: [string, 'null'], maxLength: 10 }
        slug: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        priority: { $ref: '#/components/schemas/ProjectPriority' }
        lead_id: { type: [string, 'null'] }
        start_date: { type: [string, 'null'], format: date-time }
        target_date: { type: [string, 'null'], format: date-time }
        team_ids:
          type: array
          items: { type: string, format: uuid }
        team_keys:
          type: array
          items: { type: string }
    Team:
      type: object
      required: [id, name, key, isPrivate, issueCount, memberCount, currentUserIsMember, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string }
        icon: { type: [string, 'null'] }
        isPrivate: { type: boolean }
        issueCount: { type: integer }
        memberCount: { type: integer }
        currentUserIsMember: { type: boolean }
        createdAt: { type: string, format: date-time }
        retiredAt: { type: [string, 'null'], format: date-time }
    TeamListResponse:
      type: object
      required: [workspaceId, viewerRole, canManageTeams, teams]
      properties:
        workspaceId: { type: string, format: uuid }
        viewerRole: { $ref: '#/components/schemas/WorkspaceRole' }
        canManageTeams: { type: boolean }
        teams:
          type: array
          items: { $ref: '#/components/schemas/Team' }
    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        key: { type: string, maxLength: 10 }
        isPrivate: { type: boolean }
        icon: { type: string, maxLength: 16 }
    CreateTeamResponse:
      type: object
      required: [team]
      properties:
        team: { $ref: '#/components/schemas/Team' }
    Cycle:
      type: object
      required: [id, number, team_id, start_date, end_date, auto_rollover, issue_count, completed_issue_count, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: [string, 'null'] }
        number: { type: integer }
        team_id: { type: string, format: uuid }
        start_date: { type: string, format: date-time }
        end_date: { type: string, format: date-time }
        auto_rollover: { type: boolean }
        issue_count: { type: integer }
        completed_issue_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CycleTeam:
      type: object
      required: [id, name, key, cyclesEnabled, timezone]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string }
        cyclesEnabled: { type: boolean }
        cycleStartDay: { type: [integer, 'null'] }
        cycleDurationWeeks: { type: [integer, 'null'] }
        timezone: { type: string }
    TeamCyclesResponse:
      type: object
      required: [team, cycles]
      properties:
        team: { $ref: '#/components/schemas/CycleTeam' }
        cycles:
          type: array
          items: { $ref: '#/components/schemas/Cycle' }
    CreateCycleRequest:
      type: object
      required: [start_date, end_date]
      properties:
        name: { type: [string, 'null'] }
        start_date: { type: string }
        end_date: { type: string }
        auto_rollover: { type: boolean }
    UpdateCycleRequest:
      type: object
      properties:
        name: { type: [string, 'null'] }
        start_date: { type: string }
        end_date: { type: string }
        auto_rollover: { type: boolean }
    WorkspaceRole:
      type: string
      enum: [owner, admin, member, guest]
    WorkspaceMembership:
      type: object
      required: [workspaceId, role, workspaceName, workspaceSlug]
      properties:
        workspaceId: { type: string, format: uuid }
        role: { $ref: '#/components/schemas/WorkspaceRole' }
        workspaceName: { type: string }
        workspaceSlug: { type: string }
    Workspace:
      type: object
      required: [id, name, urlSlug, region, fiscalMonth, welcomeMessage, plan]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        urlSlug: { type: string }
        logo: { type: [string, 'null'] }
        region: { type: string }
        fiscalMonth: { type: string }
        welcomeMessage: { type: string }
        plan: { type: string }
    WorkspaceSummary:
      type: object
      required: [id, name, urlSlug, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        urlSlug: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    TeamSummary:
      type: object
      required: [id, name, key, workspaceId]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string }
        workspaceId: { type: string, format: uuid }
    CreateWorkspaceRequest:
      type: object
      required: [name, urlSlug]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        urlSlug: { type: string, minLength: 2, maxLength: 63 }
    CreateWorkspaceResponse:
      type: object
      required: [workspace, team]
      properties:
        workspace: { $ref: '#/components/schemas/WorkspaceSummary' }
        team: { $ref: '#/components/schemas/TeamSummary' }
    CurrentWorkspaceResponse:
      type: object
      required: [workspace]
      properties:
        workspace: { $ref: '#/components/schemas/Workspace' }
    UpdateWorkspaceRequest:
      type: object
      properties:
        name: { type: string }
        urlSlug: { type: string }
        logo: { type: [string, 'null'] }
        fiscalMonth: { type: string }
        welcomeMessage: { type: string }
    WorkspaceMember:
      type: object
      required: [id, kind, name, email, role, status, teams, joinedAt]
      properties:
        id: { type: string }
        kind: { type: string, enum: [member, invitation] }
        userId: { type: [string, 'null'] }
        name: { type: string }
        email: { type: string }
        image: { type: [string, 'null'] }
        role: { $ref: '#/components/schemas/WorkspaceRole' }
        status: { type: string, enum: [active, pending] }
        teams:
          type: array
          items: { type: string }
        joinedAt: { type: string, format: date-time }
        lastSeenAt: { type: [string, 'null'], format: date-time }
        pronouns: { type: string }
        title: { type: string }
        location: { type: string }
        timezone: { type: string }
        showLocalTime: { type: boolean }
    WorkspaceMembersResponse:
      type: object
      required: [workspaceId, currentUserId, viewerRole, canInviteMembers, members]
      properties:
        workspaceId: { type: string, format: uuid }
        currentUserId: { type: string }
        viewerRole: { $ref: '#/components/schemas/WorkspaceRole' }
        canInviteMembers: { type: boolean }
        members:
          type: array
          items: { $ref: '#/components/schemas/WorkspaceMember' }
    MutateWorkspaceMemberRequest:
      type: object
      required: [kind, id]
      properties:
        kind: { type: string, enum: [member, invitation] }
        id: { type: string }
        role: { $ref: '#/components/schemas/WorkspaceRole' }
        action: { type: string, enum: [resend] }
    InviteWorkspaceMembersRequest:
      type: object
      required: [invites]
      properties:
        workspaceId: { type: string, format: uuid }
        invites:
          type: array
          items:
            type: object
            required: [email, role]
            properties:
              email: { type: string, format: email }
              role: { type: string, enum: [admin, member, guest] }
    InviteResult:
      type: object
      required: [email, status]
      properties:
        email: { type: string }
        status: { type: string, enum: [sent, failed] }
