openapi: 3.1.0
info:
  title: Exponential Headless API
  version: 0.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: http://localhost:3016/v1
security:
  - bearerAuth: []
paths:
  /issues:
    get:
      operationId: listIssues
      summary: List issues in the authenticated workspace
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: team_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Issues page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createIssue
      summary: Create an issue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIssueRequest'
      responses:
        '201':
          description: Created issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
  /issues/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getIssue
      responses:
        '200':
          description: Issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIssueRequest'
      responses:
        '200':
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean }
        default:
          $ref: '#/components/responses/Problem'
  /issues/{id}/comments:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: createIssueComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Created comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        default:
          $ref: '#/components/responses/Problem'
  /issues/{id}/reactions:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: toggleIssueReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactionRequest'
      responses:
        '200':
          description: Issue reaction summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionSummaryList'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteIssueReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactionRequest'
      responses:
        '200':
          description: Issue reaction summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionSummaryList'
        default:
          $ref: '#/components/responses/Problem'
  /issue-templates:
    get:
      operationId: listIssueTemplates
      parameters:
        - name: teamKey
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Issue templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueTemplateListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createIssueTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIssueTemplateRequest'
      responses:
        '201':
          description: Created issue template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueTemplateResponse'
        default:
          $ref: '#/components/responses/Problem'
  /issue-templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateIssueTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIssueTemplateRequest'
      responses:
        '200':
          description: Updated issue template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueTemplateResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteIssueTemplate
      responses:
        '200':
          description: Deleted issue template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /account:
    get:
      operationId: accountNamespace
      summary: Account route namespace; concrete resources are under /account/profile and /account/preferences.
      responses:
        default:
          $ref: '#/components/responses/Problem'
  /account/profile:
    get:
      operationId: getAccountProfile
      responses:
        '200':
          description: Account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateAccountProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountProfileRequest'
      responses:
        '200':
          description: Updated account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileResponse'
        default:
          $ref: '#/components/responses/Problem'
  /account/preferences:
    get:
      operationId: getAccountPreferences
      responses:
        '200':
          description: Account preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPreferencesResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateAccountPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountPreferencesRequest'
      responses:
        '200':
          description: Updated account preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPreferencesResponse'
        default:
          $ref: '#/components/responses/Problem'
  /comments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteComment
      responses:
        '200':
          description: Deleted comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /comments/{id}/reactions:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: toggleCommentReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactionRequest'
      responses:
        '200':
          description: Comment reaction summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionSummaryList'
        default:
          $ref: '#/components/responses/Problem'
  /custom-emojis:
    get:
      operationId: listCustomEmojis
      responses:
        '200':
          description: Custom emojis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomEmojiListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createCustomEmoji
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomEmojiRequest'
      responses:
        '201':
          description: Created custom emoji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomEmojiResponse'
        default:
          $ref: '#/components/responses/Problem'
  /custom-emojis/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    delete:
      operationId: deleteCustomEmoji
      responses:
        '200':
          description: Deleted custom emoji
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        default:
          $ref: '#/components/responses/Problem'
  /labels:
    get:
      operationId: listLabels
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [workspace, team, all], default: workspace }
        - name: teamId
          in: query
          schema: { type: string, format: uuid }
        - name: includeArchived
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Labels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLabelRequest'
      responses:
        '201':
          description: Created label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelResponse'
        default:
          $ref: '#/components/responses/Problem'
  /labels/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLabelRequest'
      responses:
        '200':
          description: Updated label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteLabel
      responses:
        '200':
          description: Deleted label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /project-labels:
    get:
      operationId: listProjectLabels
      responses:
        '200':
          description: Project labels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectLabelListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createProjectLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectLabelRequest'
      responses:
        '201':
          description: Created project label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectLabelResponse'
        default:
          $ref: '#/components/responses/Problem'
  /project-labels/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateProjectLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectLabelRequest'
      responses:
        '200':
          description: Updated project label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectLabelResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteProjectLabel
      responses:
        '200':
          description: Deleted project label
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /notifications:
    get:
      operationId: listNotifications
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /notifications/bulk-read:
    patch:
      operationId: markNotificationsRead
      responses:
        '200':
          description: Bulk mark notifications read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkReadNotificationsResponse'
        default:
          $ref: '#/components/responses/Problem'
  /personal-access-tokens:
    get:
      operationId: listPersonalAccessTokens
      responses:
        '200':
          description: Personal access tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalAccessTokenListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createPersonalAccessToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePersonalAccessTokenRequest'
      responses:
        '201':
          description: Created personal access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePersonalAccessTokenResponse'
        default:
          $ref: '#/components/responses/Problem'
  /personal-access-tokens/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      operationId: revokePersonalAccessToken
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /project-templates:
    get:
      operationId: listProjectTemplates
      summary: List project templates in the authenticated workspace
      responses:
        '200':
          description: Project templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTemplateListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createProjectTemplate
      summary: Create a project template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectTemplateRequest'
      responses:
        '201':
          description: Created project template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTemplateResponse'
        default:
          $ref: '#/components/responses/Problem'
  /project-templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateProjectTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectTemplateRequest'
      responses:
        '200':
          description: Updated project template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTemplateResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteProjectTemplate
      responses:
        '200':
          description: Deleted project template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /project-statuses:
    get:
      operationId: listProjectStatuses
      summary: List configurable project statuses for the authenticated workspace
      responses:
        '200':
          description: Project statuses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectStatusListResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateProjectStatuses
      summary: Replace configurable project statuses for the authenticated workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectStatusesRequest'
      responses:
        '200':
          description: Updated project statuses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectStatusListResponse'
        default:
          $ref: '#/components/responses/Problem'
  /projects:
    get:
      operationId: listProjects
      summary: List projects in the authenticated workspace
      responses:
        '200':
          description: Projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
  /projects/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getProject
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteProject
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /teams:
    get:
      operationId: listTeams
      summary: List visible teams in the authenticated workspace
      responses:
        '200':
          description: Teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createTeam
      summary: Create a team with default workflow states
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Created team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTeamResponse'
        default:
          $ref: '#/components/responses/Problem'
  /teams/{key}/cycles:
    parameters:
      - name: key
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: listTeamCycles
      responses:
        '200':
          description: Team cycles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamCyclesResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createTeamCycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCycleRequest'
      responses:
        '201':
          description: Created cycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cycle'
        default:
          $ref: '#/components/responses/Problem'
  /teams/{key}/cycles/{cycle_id}:
    parameters:
      - name: key
        in: path
        required: true
        schema: { type: string }
      - name: cycle_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateTeamCycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCycleRequest'
      responses:
        '200':
          description: Updated cycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cycle'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteTeamCycle
      responses:
        '200':
          description: Deleted cycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces for the authenticated principal
      responses:
        '200':
          description: Workspace memberships
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WorkspaceMembership' }
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createWorkspace
      summary: Create a workspace with a default team and workflow states
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/current:
    get:
      operationId: getCurrentWorkspace
      responses:
        '200':
          description: Current workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateCurrentWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        '200':
          description: Updated current workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteCurrentWorkspace
      responses:
        '200':
          description: Deleted current workspace
          content:
            application/json:
              schema:
                type: object
                required: [success, redirectTo]
                properties:
                  success: { type: boolean }
                  redirectTo: { type: string }
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/members:
    get:
      operationId: listWorkspaceMembers
      responses:
        '200':
          description: Active members and pending invitations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMembersResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateWorkspaceMemberOrInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: resendWorkspaceInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: removeWorkspaceMemberOrInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/invite:
    post:
      operationId: inviteWorkspaceMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteWorkspaceMembersRequest'
      responses:
        '200':
          description: Invite results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteWorkspaceMembersResponse'
        default:
          $ref: '#/components/responses/Problem'
  /sync/ws:
    get:
      operationId: watchSync
      summary: Open a workspace sync WebSocket and replay operations after a version
      parameters:
        - name: version
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: access_token
          in: query
          description: Browser/CLI WebSocket auth fallback when Authorization headers are unavailable.
          schema: { type: string }
      responses:
        '101':
          description: WebSocket protocol switch
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: lin_api or pat
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, minLength: 1, maxLength: 255 }
