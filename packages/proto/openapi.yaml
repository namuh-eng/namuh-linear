openapi: 3.1.0
info:
  title: Exponential Headless API
  version: 0.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: http://localhost:3016/v1
security:
  - bearerAuth: []
paths:
  /issues:
    get:
      operationId: listIssues
      summary: List issues in the authenticated workspace
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: team_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Issues page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createIssue
      summary: Create an issue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIssueRequest'
      responses:
        '201':
          description: Created issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
  /issues/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getIssue
      responses:
        '200':
          description: Issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIssueRequest'
      responses:
        '200':
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean }
        default:
          $ref: '#/components/responses/Problem'
  /teams:
    get:
      operationId: listTeams
      summary: List visible teams in the authenticated workspace
      responses:
        '200':
          description: Teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createTeam
      summary: Create a team with default workflow states
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Created team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTeamResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces for the authenticated principal
      responses:
        '200':
          description: Workspace memberships
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WorkspaceMembership' }
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createWorkspace
      summary: Create a workspace with a default team and workflow states
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/current:
    get:
      operationId: getCurrentWorkspace
      responses:
        '200':
          description: Current workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateCurrentWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        '200':
          description: Updated current workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentWorkspaceResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteCurrentWorkspace
      responses:
        '200':
          description: Deleted current workspace
          content:
            application/json:
              schema:
                type: object
                required: [success, redirectTo]
                properties:
                  success: { type: boolean }
                  redirectTo: { type: string }
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/members:
    get:
      operationId: listWorkspaceMembers
      responses:
        '200':
          description: Active members and pending invitations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMembersResponse'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateWorkspaceMemberOrInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: resendWorkspaceInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: removeWorkspaceMemberOrInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateWorkspaceMemberRequest'
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        default:
          $ref: '#/components/responses/Problem'
  /workspaces/invite:
    post:
      operationId: inviteWorkspaceMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteWorkspaceMembersRequest'
      responses:
        '200':
          description: Invite results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteWorkspaceMembersResponse'
        default:
          $ref: '#/components/responses/Problem'
  /sync/ws:
    get:
      operationId: watchSync
      summary: Open a workspace sync WebSocket and replay operations after a version
      parameters:
        - name: version
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: access_token
          in: query
          description: Browser/CLI WebSocket auth fallback when Authorization headers are unavailable.
          schema: { type: string }
      responses:
        '101':
          description: WebSocket protocol switch
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: lin_api or pat
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, minLength: 1, maxLength: 255 }
  responses:
    Problem:
      description: RFC 7807 problem response
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
    Team:
      type: object
      required: [id, name, key, isPrivate, issueCount, memberCount, currentUserIsMember, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string }
        icon: { type: [string, 'null'] }
        isPrivate: { type: boolean }
        issueCount: { type: integer }
        memberCount: { type: integer }
        currentUserIsMember: { type: boolean }
        createdAt: { type: string, format: date-time }
        retiredAt: { type: [string, 'null'], format: date-time }
    TeamListResponse:
      type: object
      required: [workspaceId, viewerRole, canManageTeams, teams]
      properties:
        workspaceId: { type: string, format: uuid }
        viewerRole: { $ref: '#/components/schemas/WorkspaceRole' }
        canManageTeams: { type: boolean }
        teams:
          type: array
          items: { $ref: '#/components/schemas/Team' }
    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        key: { type: string, maxLength: 10 }
        isPrivate: { type: boolean }
        icon: { type: string, maxLength: 16 }
    CreateTeamResponse:
      type: object
      required: [team]
      properties:
        team: { $ref: '#/components/schemas/Team' }
    WorkspaceRole:
      type: string
      enum: [owner, admin, member, guest]
    WorkspaceMembership:
      type: object
      required: [workspaceId, role, workspaceName, workspaceSlug]
      properties:
        workspaceId: { type: string, format: uuid }
        role: { $ref: '#/components/schemas/WorkspaceRole' }
        workspaceName: { type: string }
        workspaceSlug: { type: string }
    Workspace:
      type: object
      required: [id, name, urlSlug, region, fiscalMonth, welcomeMessage, plan]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        urlSlug: { type: string }
        logo: { type: [string, 'null'] }
        region: { type: string }
        fiscalMonth: { type: string }
        welcomeMessage: { type: string }
        plan: { type: string }
    WorkspaceSummary:
      type: object
      required: [id, name, urlSlug, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        urlSlug: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    TeamSummary:
      type: object
      required: [id, name, key, workspaceId]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string }
        workspaceId: { type: string, format: uuid }
    CreateWorkspaceRequest:
      type: object
      required: [name, urlSlug]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        urlSlug: { type: string, minLength: 2, maxLength: 63 }
    CreateWorkspaceResponse:
      type: object
      required: [workspace, team]
      properties:
        workspace: { $ref: '#/components/schemas/WorkspaceSummary' }
        team: { $ref: '#/components/schemas/TeamSummary' }
    CurrentWorkspaceResponse:
      type: object
      required: [workspace]
      properties:
        workspace: { $ref: '#/components/schemas/Workspace' }
    UpdateWorkspaceRequest:
      type: object
      properties:
        name: { type: string }
        urlSlug: { type: string }
        logo: { type: [string, 'null'] }
        fiscalMonth: { type: string }
        welcomeMessage: { type: string }
    WorkspaceMember:
      type: object
      required: [id, kind, name, email, role, status, teams, joinedAt]
      properties:
        id: { type: string }
        kind: { type: string, enum: [member, invitation] }
        userId: { type: [string, 'null'] }
        name: { type: string }
        email: { type: string }
        image: { type: [string, 'null'] }
        role: { $ref: '#/components/schemas/WorkspaceRole' }
        status: { type: string, enum: [active, pending] }
        teams:
          type: array
          items: { type: string }
        joinedAt: { type: string, format: date-time }
        lastSeenAt: { type: [string, 'null'], format: date-time }
        pronouns: { type: string }
        title: { type: string }
        location: { type: string }
        timezone: { type: string }
        showLocalTime: { type: boolean }
    WorkspaceMembersResponse:
      type: object
      required: [workspaceId, currentUserId, viewerRole, canInviteMembers, members]
      properties:
        workspaceId: { type: string, format: uuid }
        currentUserId: { type: string }
        viewerRole: { $ref: '#/components/schemas/WorkspaceRole' }
        canInviteMembers: { type: boolean }
        members:
          type: array
          items: { $ref: '#/components/schemas/WorkspaceMember' }
    MutateWorkspaceMemberRequest:
      type: object
      required: [kind, id]
      properties:
        kind: { type: string, enum: [member, invitation] }
        id: { type: string }
        role: { $ref: '#/components/schemas/WorkspaceRole' }
        action: { type: string, enum: [resend] }
    InviteWorkspaceMembersRequest:
      type: object
      required: [invites]
      properties:
        workspaceId: { type: string, format: uuid }
        invites:
          type: array
          items:
            type: object
            required: [email, role]
            properties:
              email: { type: string, format: email }
              role: { type: string, enum: [admin, member, guest] }
    InviteResult:
      type: object
      required: [email, status]
      properties:
        email: { type: string }
        status: { type: string, enum: [sent, failed] }
        error: { type: string }
    InviteWorkspaceMembersResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: '#/components/schemas/InviteResult' }
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
    IssuePriority:
      type: string
      enum: [none, urgent, high, medium, low]
    Issue:
      type: object
      required: [id, number, identifier, title, team_id, state_id, creator_id, priority, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        number: { type: integer }
        identifier: { type: string }
        title: { type: string }
        description: { type: [string, 'null'] }
        team_id: { type: string, format: uuid }
        state_id: { type: string, format: uuid }
        assignee_id: { type: [string, 'null'] }
        creator_id: { type: string }
        priority: { $ref: '#/components/schemas/IssuePriority' }
        estimate: { type: [number, 'null'] }
        parent_issue_id: { type: [string, 'null'], format: uuid }
        project_id: { type: [string, 'null'], format: uuid }
        project_milestone_id: { type: [string, 'null'], format: uuid }
        cycle_id: { type: [string, 'null'], format: uuid }
        due_date: { type: [string, 'null'], format: date-time }
        sort_order: { type: number }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
        canceled_at: { type: [string, 'null'], format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
    IssueListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Issue' }
        next_cursor: { type: [string, 'null'] }
    CreateIssueRequest:
      type: object
      required: [title, team_id]
      properties:
        title: { type: string, minLength: 1, maxLength: 500 }
        description: { type: [string, 'null'] }
        team_id: { type: string, format: uuid }
        state_id: { type: [string, 'null'], format: uuid }
        priority: { $ref: '#/components/schemas/IssuePriority' }
        assignee_id: { type: [string, 'null'] }
        project_id: { type: [string, 'null'], format: uuid }
        project_milestone_id: { type: [string, 'null'], format: uuid }
        cycle_id: { type: [string, 'null'], format: uuid }
        parent_issue_id: { type: [string, 'null'], format: uuid }
        estimate: { type: [number, 'null'] }
        due_date: { type: [string, 'null'], format: date }
    UpdateIssueRequest:
      type: object
      properties:
        title: { type: string, minLength: 1, maxLength: 500 }
        description: { type: [string, 'null'] }
        state_id: { type: string, format: uuid }
        priority: { $ref: '#/components/schemas/IssuePriority' }
        assignee_id: { type: [string, 'null'] }
        project_id: { type: [string, 'null'], format: uuid }
        project_milestone_id: { type: [string, 'null'], format: uuid }
        cycle_id: { type: [string, 'null'], format: uuid }
        parent_issue_id: { type: [string, 'null'], format: uuid }
        estimate: { type: [number, 'null'] }
        due_date: { type: [string, 'null'], format: date }
        sort_order: { type: number }
        archive: { type: boolean }
